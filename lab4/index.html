<!DOCTYPE html>
<html lang="uk">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Спортивний клуб Champion</title>

    <link rel="stylesheet" href="styles.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap"
        rel="stylesheet"
    >

</head>

<body>

    <header>

        <h1>Спортивний клуб Champion</h1>

        <p>
            Лічильник тренувань та калькулятор калорій
        </p>

    </header>

    <main>

        <section class="calculator">

            <h2>Калькулятор тренувань</h2>

            <div class="form-group">

                <label for="exercise">
                    Тип тренування
                </label>

                <select id="exercise">

                    <option value="300">
                        Кардіо
                    </option>

                    <option value="450">
                        Силове тренування
                    </option>

                    <option value="250">
                        Йога
                    </option>

                    <option value="500">
                        Інтенсивне тренування
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label for="minutes">
                    Тривалість тренування (хв)
                </label>

                <input
                    type="number"
                    id="minutes"
                    min="1"
                    value="30"
                >

                <small id="minutes-error"></small>

            </div>

            <button id="calculate-btn">
                Розрахувати калорії
            </button>

            <div class="result">

                <h3>
                    Спалено калорій:
                </h3>

                <p id="calories-result">
                    0
                </p>

            </div>

        </section>

        <section class="counter">

            <h2>Лічильник тренувань</h2>

            <p>
                Кількість завершених тренувань:
            </p>

            <div id="workout-count">
                0
            </div>

            <div class="counter-buttons">

                <button id="add-workout">
                    +1 тренування
                </button>

                <button id="reset-workouts">
                    Скинути
                </button>

            </div>

        </section>

    </main>

    <script src="script.js" defer></script>

</body>

</html>
