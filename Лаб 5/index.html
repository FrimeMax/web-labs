<!DOCTYPE html>
<html lang="uk">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Vue Трекер тренувань</title>

    <link rel="stylesheet" href="styles.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&display=swap"
        rel="stylesheet"
    >

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

</head>

<body>

    <div id="app">

        <header>

            <h1>Спортивний клуб Champion</h1>

            <p>
                Vue.js трекер тренувань
            </p>

        </header>

        <main>

            <section class="form-card">

                <h2>Додати тренування</h2>

                <form @submit.prevent="addWorkout">

                    <div class="form-group">

                        <label>
                            Назва тренування
                        </label>

                        <input
                            type="text"
                            v-model="newWorkout.title"
                            placeholder="Наприклад: Кардіо"
                        >

                    </div>

                    <div class="form-group">

                        <label>
                            Тривалість (хв)
                        </label>

                        <input
                            type="number"
                            v-model="newWorkout.duration"
                            min="1"
                        >

                    </div>

                    <button type="submit">
                        Додати
                    </button>

                </form>

            </section>

            <section class="stats-card">

                <h2>Статистика</h2>

                <p>
                    Загальна кількість тренувань:
                    <strong>{{ workouts.length }}</strong>
                </p>

                <p>
                    Загальна тривалість:
                    <strong>{{ totalDuration }} хв</strong>
                </p>

            </section>

            <section class="list-card">

                <h2>Список тренувань</h2>

                <p v-if="workouts.length === 0">
                    Список тренувань порожній
                </p>

                <workout-item
                    v-for="workout in workouts"
                    :key="workout.id"
                    :workout="workout"
                    @remove-workout="removeWorkout"
                >
                </workout-item>

            </section>

        </main>

    </div>

    <script src="app.js"></script>

</body>

</html>
